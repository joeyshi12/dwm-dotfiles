# kitty.conf - Bocchi The Rock! Themed Config

font_family      Fira Code
bold_font       auto
italic_font     auto
bold_italic_font auto
font_size       12.0

cursor_shape    block
cursor_beam_thickness 2.0
cursor_underline_thickness 2.0
cursor_color   #d38fff

background     #1e1a2b
foreground     #f8cdda

selection_background   #f1a9d0
selection_foreground   #1e1a2b

scrollbar_thumb     #d38fff

color0  #3b3052
color1  #f17fbd
color2  #a6f3a6
color3  #f9e6a5
color4  #9a88ff
color5  #d38fff
color6  #7ec8c8
color7  #f8cdda

color8  #5b527a
color9  #f2a6c6
color10 #c2f3c2
color11 #f9f1a5
color12 #b1a7ff
color13 #e1aaff
color14 #91dada
color15 #ffecf1

cursor_blink false
window_padding_width 8
background_opacity 0.9
url_launcher /usr/bin/xdg-open
hide_mouse_when_typing yes
